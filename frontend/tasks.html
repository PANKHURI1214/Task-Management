<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — All Tasks</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body page-fade-in">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">TASKFLOW</div>
      <div class="brand-tagline">Mission Control</div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">&#128640;</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="tasks.html" class="nav-item active">
        <span class="nav-icon">&#128203;</span>
        <span class="nav-label">All Tasks</span>
      </a>
      <a href="employees.html" class="nav-item">
        <span class="nav-icon">&#128101;</span>
        <span class="nav-label">Employees</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sidebarAvatar">A</div>
        <div>
          <div class="user-name" id="sidebarName">Admin</div>
          <div class="user-role" id="sidebarRole">admin</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">LOGOUT</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">ALL MISSIONS</div>
      <div class="page-subtitle">Complete task log across all employees</div>
    </div>

    <div class="section-card">
      <div class="task-list-header">
        <div class="section-title" style="margin-bottom:0">Task Log</div>
        <div class="filter-group">
          <button class="filter-chip active" data-filter="">All</button>
          <button class="filter-chip" data-filter="false">Pending</button>
          <button class="filter-chip" data-filter="true">Done</button>
        </div>
      </div>
      <div class="task-list" id="taskList" style="margin-top:18px">
        <div class="empty-state"><span class="empty-icon">&#128225;</span>Loading missions...</div>
      </div>
    </div>
  </main>

  <div id="toast"></div>
<script src="js/utils.js"></script>
<script src="js/tasks.js"></script>
</body>
</html>
