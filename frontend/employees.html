<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Employees</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body page-fade-in">

  <aside class="sidebar">
    <div class="sidebar-brand">
     
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">&#128640;</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="tasks.html" class="nav-item">
        <span class="nav-icon">&#128203;</span>
        <span class="nav-label">All Tasks</span>
      </a>
      <a href="employees.html" class="nav-item active">
        <span class="nav-icon">&#128101;</span>
        <span class="nav-label">Employees</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sidebarAvatar">A</div>
        <div>
          <div class="user-name" id="sidebarName">Admin</div>
          <div class="user-role" id="sidebarRole">admin</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">LOGOUT</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div class="page-title">CREW ROSTER</div>
      <div class="page-subtitle">All registered employees in the system</div>
    </div>

    <div class="section-card" id="addEmpSection">
      <div class="section-title">Add New Employee</div>
      <form id="empForm">
        <div class="form-row" style="margin-bottom:16px">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="eName" placeholder="e.g. Jane Doe" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="eEmail" placeholder="jane@company.com" required>
          </div>
        </div>
        <div class="form-row" style="margin-bottom:20px">
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="eDept" placeholder="e.g. Engineering">
          </div>
          <div class="form-group">
            <label>Position</label>
            <input type="text" id="ePosition" placeholder="e.g. Developer">
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <span>ADD TO ROSTER</span>
        </button>
        <p id="empMsg" class="msg success hidden"></p>
      </form>
    </div>

    <div class="section-card">
      <div class="section-title">All Employees</div>
      <div class="employee-grid" id="employeeGrid">
        <div class="empty-state"><span class="empty-icon">&#128225;</span>Loading crew...</div>
      </div>
    </div>
  </main>

  <div id="toast"></div>
<script src="js/utils.js"></script>
<script src="js/employees.js"></script>
</body>
</html>
